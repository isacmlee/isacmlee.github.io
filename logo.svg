<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="#1a1a1a"/>
  
  <!-- Border accent -->
  <rect width="64" height="64" rx="12" fill="none" stroke="url(#gradient)" stroke-width="2"/>
  
  <!-- Gradient definition -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b4a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ff8a9e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- "il" text -->
  <text x="50%" y="50%" 
        font-family="'IBM Plex Mono', monospace" 
        font-size="28" 
        font-weight="500"
        fill="#f5e6d3" 
        text-anchor="middle" 
        dominant-baseline="central">il</text>
</svg>